- type: Features
  data:
  - Wearable-native API surface covering activity, exercise, heart rate, sleep, body,
    nutrition, devices, and social
  - Advanced sensor data — SpO2, breathing rate, skin and core temperature, heart
    rate variability (RMSSD), VO2 Max
  - Electrocardiogram (ECG) readings and Irregular Rhythm Notifications (IRN) on supported
    devices
  - Active Zone Minutes (AZM) as Fitbit's modern engagement metric
  - Time-series endpoints with day, week, month, quarter, half-year, and year periods
  - Intraday endpoints (1-second / 1-minute / 5-minute / 15-minute resolution) on
    case-by-case approval
  - Webhook subscriptions for activities, body, foods, sleep, and userRevokedAccess
    — eliminates polling
  - OAuth 2.0 Authorization Code Grant with PKCE, plus Implicit Grant and Client Credentials
    (Commerce only)
  - Fine-grained scopes — activity, heartrate, location, nutrition, profile, settings,
    sleep, social, weight, oxygen_saturation, respiratory_rate, temperature, electrocardiogram,
    irregular_rhythm_notifications, cardio_fitness
  - Three application types — Personal (developer's own data), Client (mobile/single-page),
    Server (multi-user backend)
  - Default 150 requests-per-hour-per-user quota; 429 + Retry-After on overage
  - Fitbit OS SDK (JavaScript/CSS/SVG) for on-device apps and clock faces on Versa/Sense/Inspire/Charge
    devices
  - Fitbit SDK toolchain (TypeScript) and create-fitbit-app scaffolder published on
    GitHub
  - Fitbit Premium consumer tier ($9.99/month, $79.99/year) adds Daily Readiness,
    advanced sleep, mindfulness, workouts
  - Cross-platform mobile apps (iOS, Android) and Fitbit web dashboard
  - Acquired by Google in January 2021; now part of Google's hardware portfolio alongside
    Pixel Watch
  - Successor platform — Google Health API — launched on Google's modern infrastructure
    with Google OAuth 2.0
  - Legacy Fitbit Web API scheduled for turndown in September 2026; migration guides
    published on developers.google.com/health
