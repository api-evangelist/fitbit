description: 'Fitbit is a wearable health and fitness platform — devices (trackers,
  smartwatches, smart scales) plus a

  companion mobile app and cloud data services. Founded in 2007 and acquired by Google
  in January 2021,

  Fitbit is now operated as part of Google''s hardware portfolio alongside the Pixel
  Watch. The Fitbit Web API

  exposes user activity, exercise, heart rate (including intraday and HRV), sleep
  with stage breakdowns, body

  and weight, nutrition and water, devices, friends and leaderboards, and advanced
  sensor metrics — SpO2,

  breathing rate, skin and core temperature, ECG, Irregular Rhythm Notifications,
  and Cardio Fitness Score

  (VO2 Max). Authentication is OAuth 2.0 Authorization Code Grant with PKCE; default
  quota is 150 requests

  per hour per authorized user per app. A webhook subscription system streams sync
  notifications for the

  activities, body, foods, sleep, and userRevokedAccess collections. The Fitbit OS
  SDK lets developers ship

  apps and clock faces directly to Versa, Sense, and other Fitbit devices using JavaScript/CSS/SVG.
  The

  legacy Fitbit Web API is scheduled for deprecation in September 2026; new and migrated
  integrations should

  target the successor Google Health API at developers.google.com/health, which uses
  Google OAuth 2.0 and

  Google''s modern infrastructure.

  '
