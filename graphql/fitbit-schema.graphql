  date: Date!
  time: Time
  fat: Float!
  source: String
}

"""Body composition aggregate view."""
type BodyComposition {
  date: Date!
  weight: Float
  bmi: Float
  fat: Float
}

"""BMI time-series data point."""
type BMI {
  dateTime: DateTime!
  value: Float!
}

"""Weight time-series data point."""
type Weight {
  dateTime: DateTime!
  value: Float!
}

"""Body weight and body fat goals."""
type BodyGoal {
  startDate: Date
  startWeight: Float
  weight: Float
  fat: Float
}

# ─── Nutrition ───────────────────────────────────────────────────────────────

"""A food item from the Fitbit database or user-created."""
type Food {
  foodId: ID!
  name: String!
  brand: String
  calories: Int
  servings: [FoodServing!]
  units: [Int!]
  defaultServingSize: Float
  defaultUnit: FoodUnit
  isGeneric: Boolean
  locale: String
  accessLevel: String
  nutritionalValues: NutritionalValues
}

"""A food log entry."""
type FoodLog {
  logId: ID!
  loggedFood: LoggedFood!
  nutritionalValues: NutritionalValues
  isFavorite: Boolean
}

"""The food reference inside a food log entry."""
type LoggedFood {
  accessLevel: String
  amount: Float
  brand: String
  calories: Int
  foodId: ID
  locale: String
  mealTypeId: Int
  name: String
  unit: FoodUnit
  units: [Int!]
}

"""Serving size definition."""
type FoodServing {
  multiplier: Float
  servingSize: Float
  unit: FoodUnit
}

"""Food measurement unit."""
type FoodUnit {
  id: ID!
  name: String!
  plural: String
}

"""Nutritional values for a food or meal."""
type NutritionalValues {
  calories: Float
  carbs: Float
  fat: Float
  fiber: Float
  protein: Float
  sodium: Float
  water: Float
  biotin: Float
  calcium: Float
  copper: Float
  folate: Float
  folicAcid: Float
  iron: Float
  magnesium: Float
  niacin: Float
  pantothenicAcid: Float
  phosphorus: Float
  potassium: Float
  riboflavin: Float
  saturatedFat: Float
  thiamin: Float
  transFat: Float
  vitaminA: Float
  vitaminB6: Float
  vitaminB12: Float
  vitaminC: Float
  vitaminD: Float
  vitaminE: Float
  vitaminK: Float
  zinc: Float
}

"""A saved meal (collection of food log entries)."""
type Meal {
  id: ID!
  name: String!
  description: String
  mealFoods: [MealFood!]!
}

"""A food item within a saved meal."""
type MealFood {
  loggedFood: LoggedFood!
  nutritionalValues: NutritionalValues
}

"""Daily nutrition summary."""
type NutritionSummary {
  date: Date!
  calories: NutritionCaloriesSummary
  goals: NutritionGoals
  water: Float
  summary: NutritionalValues
}

"""Calorie budget vs intake for the day."""
type NutritionCaloriesSummary {
  budget: Float
  foodCalories: Float
  estimated: Float
  net: Float
}

"""User nutrition goals."""
type NutritionGoals {
  calories: Float
  estimatedCalories: Float
}

"""Food plan (calorie deficit / surplus goal)."""
type FoodPlan {
  estimatedDate: Date
  intensity: String
  personalized: Boolean
  supply: [FoodPlanSupply!]
}

"""Daily calorie supply target for a food plan."""
type FoodPlanSupply {
  date: Date!
  calories: Int!
}

"""A water log entry."""
type WaterLog {
  logId: ID!
  amount: Float!
  date: Date!
}

"""Daily water intake goal."""
type WaterGoal {
  goal: Float!
  startDate: Date
}

"""Daily water intake summary."""
type WaterSummary {
  date: Date!
  goal: Float
  water: Float
  waterLogs: [WaterLog!]
}

# ─── Devices ─────────────────────────────────────────────────────────────────

"""A paired Fitbit device on the user's account."""
type Device {
  id: ID!
  deviceVersion: String!
  type: DeviceType!
  battery: BatteryLevel!
  batteryLevel: Int
  lastSyncTime: DateTime!
  mac: String
  features: [String!]
  alarms: [Alarm!]
  model: DeviceModel
}

"""Fitbit device model metadata."""
type DeviceModel {
  name: String!
  version: String
  type: DeviceType
  features: [String!]
}

"""Battery status for a device."""
type DeviceBattery {
  deviceId: ID!
  batteryLevel: Int!
  battery: BatteryLevel!
  lastSyncTime: DateTime!
}

"""A tracker alarm."""
type Alarm {
  alarmId: ID!
  deleted: Boolean
  enabled: Boolean!
  label: String
  recurring: Boolean
  snoozeCount: Int
  snoozeLength: Int
  syncedToDevice: Boolean
  time: AlarmTime!
  type: String
  vibe: String
  weekDays: [String!]
}

"""Alarm time (wall-clock with offset)."""
type AlarmTime {
  time: Time!
  offset: Int
}

# ─── Social ──────────────────────────────────────────────────────────────────

"""A Fitbit friend with leaderboard context."""
type Friend {
  user: FriendUser!
  rank: Int
}

"""Minimal user reference for friends."""
type FriendUser {
  encodedId: ID!
  displayName: String!
  avatar: String
  avatar150: String
}

"""Weekly friends leaderboard."""
type Leaderboard {
  rank: Int
  lastUpdateTime: DateTime
  friends: [LeaderboardEntry!]!
}

"""A single leaderboard entry."""
type LeaderboardEntry {
  encodedId: ID!
  displayName: String!
  avatar: String
  rank: Int!
  steps: Int!
  activeZoneMinutes: Int
}

# ─── Badges ──────────────────────────────────────────────────────────────────

"""A Fitbit achievement badge."""
type Badge {
  badgeGradientEndColor: String
  badgeGradientStartColor: String
  badgeType: String!
  category: String!
  cheers: [JSON]
  dateTime: DateTime!
  description: String
  earnedMessage: String
  encodedId: ID!
  image50px: String
  image75px: String
  image100px: String
  image125px: String
  image300px: String
  marketingDescription: String
  mobileDescription: String
  name: String!
  shareImage640px: String
  shareText: String
  shortDescription: String
  shortName: String
  timesAchieved: Int!
  unit: String
  value: Float!
}

# ─── ECG ─────────────────────────────────────────────────────────────────────

"""An ECG reading from a supported Fitbit device."""
type ECG {
  logId: ID!
  date: Date!
  startTime: DateTime!
  averageHeartRate: Int
  resultClassification: EcgResultStatus!
  waveformSamples: [Int!]
  samplingFrequencyHz: Float
  numberOfWaveformSamples: Int
  leadNumber: Int
  scalingFactor: Float
  deviceName: String
  featureVersion: String
}

"""Irregular Rhythm Notification (IRN) alert record."""
type IrregularRhythmNotification {
  logId: ID!
  date: Date!
  startTime: DateTime!
  type: String
  deviceName: String
  featureVersion: String
}

"""IRN feature enrollment status."""
type IrregularRhythmNotificationEnrollment {
  enabled: Boolean!
  enrolledAt: DateTime
}

# ─── Subscriptions (Webhooks) ────────────────────────────────────────────────

"""A webhook subscription for event notifications."""
type Subscription {
  ownerId: String!
  ownerType: String!
  subscriberId: String!
  subscriptionId: ID!
  collectionType: SubscriptionCollection!
}

"""A received subscription event notification."""
type EventSubscription {
  collectionType: SubscriptionCollection!
  date: Date!
  ownerId: String!
  ownerType: String!
  subscriptionId: ID!
  updates: [SubscriptionUpdate!]
}

"""Individual update within a subscription event."""
type SubscriptionUpdate {
  collectionType: String!
  date: Date
  ownerId: String
  ownerType: String
}

"""Record of a device-to-cloud sync event."""
type SyncRecord {
  date: DateTime!
  deviceId: ID!
  success: Boolean!
}

# ─── Authorization ───────────────────────────────────────────────────────────

"""OAuth 2.0 access token metadata."""
type OAuthToken {
  accessToken: String!
  expiresIn: Int!
  refreshToken: String
  scope: String!
  tokenType: String!
  userId: ID!
}

"""Token introspection result."""
type TokenIntrospection {
  active: Boolean!
  clientId: String
  expiresAt: DateTime
  iat: Int
  scope: String
  sub: String
  tokenType: String
  userId: String
}

# ─── Query ───────────────────────────────────────────────────────────────────

type Query {
  """Get the authorized user's profile."""
  user(userId: ID): User

  """Get daily activity summary."""
  activity(userId: ID, date: Date!): Activity

  """Get activity time series."""
  activityTimeSeries(
    userId: ID
    resourcePath: String!
    date: Date!
    period: Period
    endDate: Date
  ): [Steps!]

  """Get steps intraday detail."""
  stepsIntraday(
    userId: ID
    date: Date!
    detailLevel: IntradayDetailLevel!
    startTime: Time
    endTime: Time
  ): [Steps!]

  """Get heart rate data for a date."""
  heartRate(userId: ID, date: Date!): HeartRate

  """Get heart rate time series."""
  heartRateTimeSeries(
    userId: ID
    date: Date!
    period: Period
    endDate: Date
  ): [HeartRateTimeSeries!]

  """Get heart rate intraday data."""
  heartRateIntraday(
    userId: ID
    date: Date!
    detailLevel: IntradayDetailLevel!
    startTime: Time
    endTime: Time
  ): [HeartRateIntraday!]

  """Get HRV summary for a date or range."""
  hrv(userId: ID, date: Date, startDate: Date, endDate: Date): [HRV!]

  """Get sleep logs by date."""
  sleepLogs(userId: ID, date: Date, startDate: Date, endDate: Date): [SleepLog!]

  """Get the user's sleep goal."""
  sleepGoal(userId: ID): SleepGoal

  """Get sleep score for a date range."""
  sleepScore(userId: ID, date: Date, startDate: Date, endDate: Date): [SleepScore!]

  """Get SpO2 for a date or range."""
  spo2(userId: ID, date: Date, startDate: Date, endDate: Date): [SpO2!]

  """Get breathing rate for a date or range."""
  breathingRate(userId: ID, date: Date, startDate: Date, endDate: Date): [BreathingRate!]

  """Get skin/core temperature for a date or range."""
  temperature(userId: ID, date: Date, startDate: Date, endDate: Date): [Temperature!]

  """Get cardio fitness score (VO2 Max)."""
  cardioFitnessScore(userId: ID, date: Date, startDate: Date, endDate: Date): [CardioFitnessScore!]

  """Get body weight logs."""
  weightLogs(userId: ID, date: Date, startDate: Date, endDate: Date): [WeightLog!]

  """Get body fat logs."""
  bodyFatLogs(userId: ID, date: Date, startDate: Date, endDate: Date): [BodyFat!]

  """Get body weight goal."""
  bodyGoal(userId: ID): BodyGoal

  """Search for foods in the Fitbit database."""
  searchFoods(query: String!, locale: String): [Food!]

  """Get a food by ID."""
  food(foodId: ID!): Food

  """Get food logs for a date."""
  foodLogs(userId: ID, date: Date!): [FoodLog!]

  """Get nutrition summary for a date."""
  nutritionSummary(userId: ID, date: Date!): NutritionSummary

  """Get meals saved by the user."""
  meals(userId: ID): [Meal!]

  """Get a specific meal."""
  meal(mealId: ID!): Meal

  """Get water logs for a date."""
  waterLogs(userId: ID, date: Date!): [WaterLog!]

  """Get water goal."""
  waterGoal(userId: ID): WaterGoal

  """Get paired devices for the user."""
  devices(userId: ID): [Device!]

  """Get alarms for a device."""
  alarms(userId: ID, deviceId: ID!): [Alarm!]

  """Get ECG readings."""
  ecgLogs(userId: ID, limit: Int, offset: Int, sort: String): [ECG!]

  """Get IRN alerts."""
  irregularRhythmNotifications(userId: ID, limit: Int, offset: Int, sort: String): [IrregularRhythmNotification!]

  """Get IRN enrollment status."""
  irregularRhythmNotificationEnrollment(userId: ID): IrregularRhythmNotificationEnrollment

  """Get the user's friends."""
  friends(userId: ID): [Friend!]

  """Get the weekly friends leaderboard."""
  leaderboard(userId: ID): Leaderboard

  """Get the user's badges."""
  badges(userId: ID): [Badge!]

  """Get webhook subscriptions for a collection."""
  subscriptions(userId: ID, collection: SubscriptionCollection): [Subscription!]

  """Introspect an OAuth token."""
  introspectToken(token: String!): TokenIntrospection

  """Get the Fitbit exercise catalog."""
  exercises: [Exercise!]

  """Get activity logs."""
  activityLogs(userId: ID, afterDate: DateTime, beforeDate: DateTime, sort: String, limit: Int, offset: Int): [ActivityLog!]
}

# ─── Mutation ────────────────────────────────────────────────────────────────

type Mutation {
  """Update the authorized user's profile."""
  updateUserProfile(input: UpdateUserProfileInput!): User

  """Log an activity."""
  logActivity(input: LogActivityInput!): ActivityLog

  """Delete an activity log entry."""
  deleteActivityLog(logId: ID!): Boolean

  """Update activity goals."""
  updateActivityGoals(userId: ID, input: ActivityGoalInput!): ActivityGoal

  """Add a favorite activity."""
  addFavoriteActivity(activityId: ID!): Boolean

  """Remove a favorite activity."""
  removeFavoriteActivity(activityId: ID!): Boolean

  """Log a sleep record."""
  logSleep(input: LogSleepInput!): SleepLog

  """Delete a sleep log entry."""
  deleteSleepLog(logId: ID!): Boolean

  """Update the sleep goal."""
  updateSleepGoal(minDuration: Int!): SleepGoal

  """Log a weight entry."""
  logWeight(input: LogWeightInput!): WeightLog

  """Delete a weight log entry."""
  deleteWeightLog(logId: ID!): Boolean

  """Update body goals."""
  updateBodyGoals(input: BodyGoalInput!): BodyGoal

  """Log a body fat entry."""
  logBodyFat(input: LogBodyFatInput!): BodyFat

  """Delete a body fat log entry."""
  deleteBodyFatLog(logId: ID!): Boolean

  """Log food consumption."""
  logFood(input: LogFoodInput!): FoodLog

  """Delete a food log entry."""
  deleteFoodLog(logId: ID!): Boolean

  """Create a custom food."""
  createFood(input: CreateFoodInput!): Food

  """Delete a custom food."""
  deleteFood(foodId: ID!): Boolean

  """Create a meal."""
  createMeal(input: CreateMealInput!): Meal

  """Update a meal."""
  updateMeal(mealId: ID!, input: CreateMealInput!): Meal

  """Delete a meal."""
  deleteMeal(mealId: ID!): Boolean

  """Log water intake."""
  logWater(input: LogWaterInput!): WaterLog

  """Update water intake for a log entry."""
  updateWaterLog(logId: ID!, amount: Float!): WaterLog

  """Delete a water log entry."""
  deleteWaterLog(logId: ID!): Boolean

  """Update the water goal."""
  updateWaterGoal(goal: Float!): WaterGoal

  """Create a tracker alarm."""
  createAlarm(userId: ID, deviceId: ID!, input: AlarmInput!): Alarm

  """Update a tracker alarm."""
  updateAlarm(userId: ID, deviceId: ID!, alarmId: ID!, input: AlarmInput!): Alarm

  """Delete a tracker alarm."""
  deleteAlarm(userId: ID, deviceId: ID!, alarmId: ID!): Boolean

  """Create a webhook subscription."""
  createSubscription(userId: ID, collection: SubscriptionCollection!, subscriptionId: ID!): Subscription

  """Delete a webhook subscription."""
  deleteSubscription(userId: ID, collection: SubscriptionCollection!, subscriptionId: ID!): Boolean

  """Revoke an OAuth token."""
  revokeToken(token: String!): Boolean

  """Refresh an OAuth access token."""
  refreshToken(refreshToken: String!): OAuthToken
}

