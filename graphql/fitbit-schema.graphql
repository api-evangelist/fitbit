"""
Fitbit GraphQL Schema
Conceptual GraphQL schema for the Fitbit Web API (now part of Google).
Covers activity, heart rate, sleep, body, nutrition, devices, social,
advanced sensors, ECG, subscriptions, and authorization primitives.
Legacy Fitbit Web API is scheduled for deprecation September 2026;
new integrations should target the Google Health API.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar Date
scalar DateTime
scalar Time
scalar JSON

# ─── Enums ──────────────────────────────────────────────────────────────────

enum UnitSystem {
  en_US
  en_GB
  METRIC
}

enum Gender {
  MALE
  FEMALE
  NA
}

enum BatteryLevel {
  HIGH
  MEDIUM
  LOW
  EMPTY
}

enum DeviceType {
  TRACKER
  SCALE
  WATCH
}

enum SleepType {
  CLASSIC
  STAGES
}

enum ActivityLevel {
  SEDENTARY
  LIGHTLY_ACTIVE
  FAIRLY_ACTIVE
  VERY_ACTIVE
}

enum HeartRateZoneName {
  OUT_OF_RANGE
  FAT_BURN
  CARDIO
  PEAK
}

enum EcgResultStatus {
  NORMAL_SINUS_RHYTHM
  ATRIAL_FIBRILLATION
  INCONCLUSIVE
  CONNECTED_NOT_RECORDING
  RECORDING
  TOO_NOISY
  OFF_WRIST
  UNDETERMINED
}

enum SubscriptionCollection {
  ACTIVITIES
  BODY
  FOODS
  SLEEP
  USER_REVOKED_ACCESS
}

enum Period {
  ONE_DAY
  SEVEN_DAYS
  THIRTY_DAYS
  ONE_WEEK
  ONE_MONTH
  THREE_MONTHS
  SIX_MONTHS
  ONE_YEAR
  MAX
}

enum IntradayDetailLevel {
  ONE_SECOND
  ONE_MINUTE
  FIVE_MINUTES
  FIFTEEN_MINUTES
}

# ─── User & Profile ─────────────────────────────────────────────────────────

"""Authorized Fitbit user account."""
type User {
  encodedId: ID!
  displayName: String!
  fullName: String
  firstName: String
  lastName: String
  avatar: String
  avatar150: String
  avatar640: String
  gender: Gender
  dateOfBirth: Date
  age: Int
  heightUnit: String
  weightUnit: String
  waterUnit: String
  glucoseUnit: String
  temperatureUnit: String
  distanceUnit: String
  locale: String
  timezone: String
  country: String
  state: String
  city: String
  memberSince: Date
  isPremium: Boolean
  features: UserFeatures
  profile: UserProfile
  devices: [Device!]
  badges: [Badge!]
  friends: [Friend!]
  leaderboard: Leaderboard
}

"""Extended profile fields for the authorized user."""
type UserProfile {
  encodedId: ID!
  displayName: String!
  height: Float
  weight: Float
  strideLengthRunning: Float
  strideLengthWalking: Float
  swimUnit: String
  foodsLocale: String
  glucoseUnit: String
  offsetFromUTCMillis: Int
  startDayOfWeek: String
  clockTimeDisplayFormat: String
}

"""Feature-flag set for the user account."""
type UserFeatures {
  exerciseGoal: Boolean
}

# ─── Activity ────────────────────────────────────────────────────────────────

"""Daily activity summary for a user."""
type Activity {
  date: Date!
  steps: Int
  distance: Float
  distanceUnit: String
  floors: Int
  elevation: Float
  caloriesOut: Int
  caloriesBMR: Int
  activeScore: Int
  activityCalories: Int
  marginalCalories: Int
  sedentaryMinutes: Int
  lightlyActiveMinutes: Int
  fairlyActiveMinutes: Int
  veryActiveMinutes: Int
  activeZoneMinutes: ActiveZoneMinutes
  levels: [ActivityLevel!]
  goals: ActivityGoal
  summary: ActivitySummary
  activities: [ActivityLog!]
}

"""Breakdown of Active Zone Minutes by heart rate zone."""
type ActiveZoneMinutes {
  inDefaultZone: Int
  inHeartRateZone: Int
  fatBurnActiveZoneMinutes: Int
  cardioActiveZoneMinutes: Int
  peakActiveZoneMinutes: Int
  totalMinutes: Int
}

"""Aggregated daily activity metrics."""
type ActivitySummary {
  steps: Int
  floors: Int
  elevation: Float
  caloriesOut: Int
  activityCalories: Int
  sedentaryMinutes: Int
  lightlyActiveMinutes: Int
  fairlyActiveMinutes: Int
  veryActiveMinutes: Int
  distances: [Distance!]
}

"""Distance breakdown by activity type."""
type Distance {
  activity: String!
  distance: Float!
}

"""Activity or exercise goal for the user."""
type ActivityGoal {
  activeMinutes: Int
  caloriesOut: Int
  distance: Float
  floors: Int
  steps: Int
  activeZoneMinutes: Int
}

"""A logged activity or exercise session."""
type ActivityLog {
  logId: ID!
  activityId: Int
  activityParentId: Int
  activityParentName: String
  name: String!
  description: String
  hasStartTime: Boolean
  isFavorite: Boolean
  logType: String
  startTime: DateTime
  duration: Int
  calories: Int
  steps: Int
  distance: Float
  distanceUnit: String
  pace: Float
  speed: Float
  averageHeartRate: Int
  heartRateZones: [HeartRateZone!]
  activeDuration: Int
  lastModified: DateTime
  levels: [ActivityLevelDetail!]
  source: LogSource
  tcxLink: String
}

"""Granular activity level detail within a log."""
type ActivityLevelDetail {
  minutes: Int
  name: String
}

"""Source of a log entry (device, app, or manual)."""
type LogSource {
  id: String
  name: String
  trackerFeatures: [String!]
  type: String
  url: String
}

"""Exercise type from the Fitbit exercise catalog."""
type Exercise {
  id: ID!
  hasSpeed: Boolean
  mets: Float
  name: String!
  accessLevel: String
}

"""Summary of a run exercise."""
type RunSummary {
  averagePace: Float
  averageSpeed: Float
  elevationGain: Float
  steps: Int
}

"""Summary of a bike exercise."""
type BikeSummary {
  averageSpeed: Float
  elevationGain: Float
}

"""Summary of a swim exercise."""
type SwimSummary {
  averageLaps: Float
  laps: Int
  lengths: Int
  poolLength: Float
  poolLengthUnit: String
  strokeCount: Int
}

"""Summary of a golf exercise."""
type GolfSummary {
  averageSpeed: Float
  courseId: String
  courseName: String
}

"""One set within a strength-training exercise log."""
type ExerciseSet {
  distance: Float
  duration: Int
  percentBodyWeight: Float
  repetitions: Int
  setType: String
  speed: Float
  weight: Float
  weightUnit: String
}

# ─── Steps & Distance (time-series) ─────────────────────────────────────────

"""A single data point in a steps time series."""
type Steps {
  dateTime: DateTime!
  value: Int!
}

"""A single data point in a distance time series."""
type DistanceSeries {
  dateTime: DateTime!
  value: Float!
}

"""A single data point in a calories time series."""
type Calories {
  dateTime: DateTime!
  value: Int!
}

"""A single data point in an active-minutes time series."""
type ActiveMinutes {
  dateTime: DateTime!
  value: Int!
}

# ─── Heart Rate ──────────────────────────────────────────────────────────────

"""Aggregated heart rate data for a day."""
type HeartRate {
  date: Date!
  restingHeartRate: Int
  heartRateZones: [HeartRateZone!]
  customHeartRateZones: [HeartRateZone!]
  value: HeartRateValue
}

"""Detail fields inside a daily heart rate record."""
type HeartRateValue {
  bpmMode: Int
  customHeartRateZones: [HeartRateZone!]
  heartRateZones: [HeartRateZone!]
  restingHeartRate: Int
}

"""Heart rate zone definition and minutes/calories in zone."""
type HeartRateZone {
  caloriesOut: Float
  max: Int
  min: Int
  minutes: Int
  name: HeartRateZoneName!
}

"""Time-series data point for heart rate."""
type HeartRateTimeSeries {
  dateTime: DateTime!
  value: HeartRateValue!
}

"""Intraday heart rate data point."""
type HeartRateIntraday {
  time: Time!
  value: Int!
}

"""Heart Rate Variability daily summary."""
type HRVSummary {
  date: Date!
  dailyRmssd: Float
  deepRmssd: Float
}

"""Heart Rate Variability detail record."""
type HRV {
  date: Date!
  minutes: [HRVMinute!]
  summary: HRVSummary
}

"""Single intraday HRV reading."""
type HRVMinute {
  minute: DateTime!
  value: HRVValue!
}

"""HRV measurement values."""
type HRVValue {
  rmssd: Float!
  coverage: Float
  hf: Float
  lf: Float
}

# ─── Sleep ───────────────────────────────────────────────────────────────────

"""Sleep record for one night."""
type SleepLog {
  logId: ID!
  dateOfSleep: Date!
  startTime: DateTime!
  endTime: DateTime!
  duration: Int
  minutesToFallAsleep: Int
  minutesAsleep: Int
  minutesAwake: Int
  minutesAfterWakeup: Int
  timeInBed: Int
  efficiency: Int
  type: SleepType
  infoCode: Int
  isMainSleep: Boolean
  levels: SleepStageData
  summary: SleepSummary
  logType: String
}

"""Container for sleep stage data."""
type SleepStageData {
  data: [SleepStage!]
  shortData: [SleepStage!]
  summary: SleepStageSummary
}

"""A single 30-second epoch of sleep stage data."""
type SleepStage {
  dateTime: DateTime!
  level: String!
  seconds: Int!
}

"""Aggregate minutes per sleep stage."""
type SleepStageSummary {
  deep: SleepStageStats
  light: SleepStageStats
  rem: SleepStageStats
  wake: SleepStageStats
  asleep: SleepStageStats
  awake: SleepStageStats
  restless: SleepStageStats
}

"""Statistics for a single sleep stage."""
type SleepStageStats {
  count: Int
  minutes: Int
  thirtyDayAvgMinutes: Int
}

"""Aggregated sleep summary across main and nap sessions."""
type SleepSummary {
  stages: SleepStageSummary
  totalMinutesAsleep: Int
  totalSleepRecords: Int
  totalTimeInBed: Int
}

"""Daily Sleep Score (Fitbit Premium metric)."""
type SleepScore {
  date: Date!
  overall: SleepScoreValue
  composition: SleepCompositionScore
  revitalization: SleepRevitalizationScore
  duration: SleepDurationScore
}

"""Overall sleep score value."""
type SleepScoreValue {
  qualityDescription: String
  score: Int
}

"""Sleep composition score component."""
type SleepCompositionScore {
  qualityDescription: String
  score: Int
}

"""Sleep revitalization score component."""
type SleepRevitalizationScore {
  qualityDescription: String
  score: Int
}

"""Sleep duration score component."""
type SleepDurationScore {
  qualityDescription: String
  score: Int
}

"""User's sleep goal."""
type SleepGoal {
  bedtime: Time
  minDuration: Int
  updatedOn: Date
  wakeupTime: Time
}

# ─── SpO2, Breathing Rate, Temperature ──────────────────────────────────────

"""Blood oxygen saturation (SpO2) daily summary."""
type SpO2 {
  date: Date!
  avg: Float
  min: Float
  max: Float
  minutes: [SpO2Minute!]
}

"""Intraday SpO2 reading."""
type SpO2Minute {
  minute: DateTime!
  value: Float!
}

"""Breathing rate daily summary."""
type BreathingRate {
  date: Date!
  breathingRate: BreathingRateValue
  full: Float
  rem: Float
  light: Float
  deep: Float
}

"""Breathing rate values by sleep stage."""
type BreathingRateValue {
  deepSleepSummary: BreathingRateStageSummary
  remSleepSummary: BreathingRateStageSummary
  fullSleepSummary: BreathingRateStageSummary
  lightSleepSummary: BreathingRateStageSummary
}

"""Breathing rate average for a sleep stage."""
type BreathingRateStageSummary {
  breathingRate: Float
}

"""Skin and core temperature daily summary."""
type Temperature {
  date: Date!
  logType: String
  skin: TemperatureValue
  core: TemperatureValue
}

"""Temperature reading and deviation."""
type TemperatureValue {
  nightlyRelative: Float
  expected: TemperatureRange
}

"""Expected temperature range."""
type TemperatureRange {
  min: Float
  max: Float
}

"""Cardio Fitness Score (VO2 Max) record."""
type CardioFitnessScore {
  date: Date!
  value: CardioFitnessValue
}

"""VO2 Max value and confidence range."""
type CardioFitnessValue {
  vo2Max: String
  vo2MaxEstimate: Float
  filteredDemographicVo2Max: Float
  demographicVo2MaxDeviation: Float
}

# ─── Body ────────────────────────────────────────────────────────────────────

"""A weight log entry."""
type WeightLog {
  logId: ID!
  date: Date!
  time: Time
  weight: Float!
  bmi: Float
  fat: Float
  source: String
}

"""A body fat percentage log entry."""
type BodyFat {
