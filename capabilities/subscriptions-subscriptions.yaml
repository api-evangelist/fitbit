naftiko: 1.0.0-alpha2
info:
  label: Fitbit Subscriptions API — Subscriptions
  description: Fitbit Subscriptions (webhooks) API. Create, list, and delete webhook subscriptions for activities, body, foods,
    sleep, and userRevokedAccess collections.
  tags:
  - Fitbit
  - Webhooks
  - Subscriptions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FITBIT_ACCESS_TOKEN: FITBIT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: subscriptions-subscriptions
    baseUri: https://api.fitbit.com
    description: Fitbit Subscriptions API.
    resources:
    - name: create-subscription
      path: /1/user/-/{collection}/apiSubscriptions/{subscriptionId}.json
      operations:
      - name: createSubscription
        method: POST
        description: Create a webhook subscription for a collection (activities, body, foods, sleep, userRevokedAccess).
        outputRawFormat: json
        inputParameters:
        - name: collection
          in: path
          type: string
          required: true
        - name: subscriptionId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteSubscription
        method: DELETE
        description: Delete a webhook subscription for a collection.
        outputRawFormat: json
        inputParameters:
        - name: collection
          in: path
          type: string
          required: true
        - name: subscriptionId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.FITBIT_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fitbit Subscriptions API.
    tools:
    - name: fitbit-create-subscription
      description: Create a webhook subscription for activities, body, foods, sleep, or userRevokedAccess.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: subscriptions-subscriptions.createSubscription
      with:
        collection: tools.collection
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: fitbit-delete-subscription
      description: Delete a webhook subscription.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: subscriptions-subscriptions.deleteSubscription
      with:
        collection: tools.collection
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
