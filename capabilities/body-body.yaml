naftiko: 1.0.0-alpha2
info:
  label: Fitbit Body API — Body
  description: Fitbit Body API. Read and write weight and body fat logs for the authorized user.
  tags:
  - Fitbit
  - Body
  - Weight
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FITBIT_ACCESS_TOKEN: FITBIT_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: body-body
    baseUri: https://api.fitbit.com
    description: Fitbit Body API.
    resources:
    - name: weight-by-date
      path: /1/user/-/body/log/weight/date/{date}.json
      operations:
      - name: getWeightLogs
        method: GET
        description: List weight logs for a date.
        outputRawFormat: json
        inputParameters:
        - name: date
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: log-weight
      path: /1/user/-/body/log/weight.json
      operations:
      - name: logWeight
        method: POST
        description: Create a body weight log entry.
        outputRawFormat: json
        inputParameters:
        - name: weight
          in: query
          type: number
          required: true
        - name: date
          in: query
          type: string
          required: true
        - name: time
          in: query
          type: string
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.FITBIT_ACCESS_TOKEN}}'
      placement: header
  exposes:
  - type: mcp
    namespace: body-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fitbit Body API.
    tools:
    - name: fitbit-get-weight-logs
      description: Fetch weight log entries for a given date.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: body-body.getWeightLogs
      with:
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
    - name: fitbit-log-weight
      description: Create a body weight log entry.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: body-body.logWeight
      with:
        weight: tools.weight
        date: tools.date
        time: tools.time
      outputParameters:
      - type: object
        mapping: $.
