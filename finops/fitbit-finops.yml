specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Fitbit
providerId: fitbit
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Wearable
  - Health
description: |
  FOCUS-aligned FinOps definition for the Fitbit consumer and developer
  surface. The Fitbit Web API itself is offered at no direct charge to
  developers — there is no usage-based metering of API calls — so the FinOps
  surface centers on the consumer subscription (Fitbit Premium) and on the
  hardware purchase (Fitbit devices). Successor surface (Google Health API)
  inherits Google Cloud's metering and billing model.
sources:
  - https://www.fitbit.com/global/us/products/premium
  - https://dev.fitbit.com/build/reference/web-api/
  - https://developers.google.com/health
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Fitbit (Google LLC)
serviceCategory: Health and Wearables
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Purchase
    - Tax
    - Credit
    - Adjustment
  primaryUnit: subscription
  secondaryUnits:
    - device
focusColumns:
  ServiceName: Fitbit Premium
  ServiceCategory: Health and Wearables
  ProviderName: Fitbit
  PublisherName: Fitbit (Google LLC)
  InvoiceIssuerName: Google LLC
  PricingCategory: Subscription
  PricingUnit: month
  BillingCurrency: USD
meters:
  - name: premium_subscription_monthly
    unit: subscription
    aggregation: sum
    dimensions:
      - user
      - region
    description: One charge per active Fitbit Premium subscriber per month.
  - name: premium_subscription_annual
    unit: subscription
    aggregation: sum
    dimensions:
      - user
      - region
    description: One charge per active Fitbit Premium annual subscriber per year.
  - name: device_purchase
    unit: device
    aggregation: sum
    dimensions:
      - model
      - region
    description: One-time hardware purchase of a Fitbit tracker, smartwatch, or scale.
notes:
  - The Fitbit Web API does not meter or bill API calls. There is no per-call cost.
  - Cost optimization on the consumer side is limited to choosing monthly vs. annual Premium billing (annual nets approximately a 33 percent discount).
  - Successor API surface — Google Health API — is billed through Google Cloud; consult Google Cloud's FOCUS export for usage-based costs once integrations are migrated.
